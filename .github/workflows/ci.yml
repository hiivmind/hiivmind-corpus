name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Skip the fastembed model entirely in CI: no ~90MB download and no
      # onnxruntime execution (which intermittently segfaults on the runner).
      # Model-dependent tests are marked `model` and deselected below; token
      # counting falls back to a word-count approximation.
      HIIVMIND_CORPUS_NO_MODEL: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --group dev pytest -q -m "not model"

      - name: Smoke-test PEP 723 scripts
        run: |
          uv run lib/corpus/scripts/detect.py
          uv run lib/corpus/scripts/chunk.py --help
          uv run lib/corpus/scripts/verify_entries.py --help
          uv run lib/corpus/scripts/validate_result.py --help
